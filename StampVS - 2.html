<!DOCTYPE html>
<html>
<head>
    <title>Digital Stamp App</title>

    <!-- html2canvas -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        .hidden {
            display: none;
        }

        .stamp {
            width: 180px;
            aspect-ratio: 1 / 1;
            border: 4px solid red;
            border-radius: 50%;
            color: red;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            font-weight: bold;
            overflow: hidden;
        }

        .stamp div {
            width: 100%;
            text-align: center;
        }

        .line {
            width: 100%;
            height: 2px;
            background-color: red;
        }

        .date {
            font-size: 16px;
        }
    </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- APP PAGE -->
<div id="appPage" class="hidden">
    <h3>Digital Stamp</h3>
    <input type="date" id="dateInput" onchange="updateDate()"><br>

    <div class="stamp" id="stamp">
        <div>KPTI</div>
        <div class="line"></div>
        <div class="date" id="dateText">--/---/--</div>
        <div class="line"></div>
        <div id="userName"></div>
    </div>

    <button onclick="downloadStamp()">Download JPG</button>
    <button onclick="logout()">Logout</button>
</div>

<script>
const users = [
    { username: "kavita", password: "1234", name: "KAVITA" },
    { username: "rahul", password: "1234", name: "RAHUL" }
];

let currentUser = null;

function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    const user = users.find(x => x.username === u && x.password === p);

    if (user) {
        currentUser = user;
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("appPage").classList.remove("hidden");
        document.getElementById("userName").innerText = user.name;
    } else {
        document.getElementById("error").innerText = "Invalid username or password!";
    }
}

function logout() {
    location.reload();
}

function formatDate(dateStr) {
    const d = new Date(dateStr);
    const day = String(d.getDate()).padStart(2, '0');
    const months = ["JAN","FEB","MAR","APR","MAY","JUN",
                    "JUL","AUG","SEP","OCT","NOV","DEC"];
    const month = months[d.getMonth()];
    const year = String(d.getFullYear()).slice(-2);

    return `${day}/${month}/${year}`;
}

function updateDate() {
    const val = document.getElementById("dateInput").value;
    if (!val) return;
    document.getElementById("dateText").innerText = formatDate(val);
}

function downloadStamp() {
    const stamp = document.getElementById("stamp");

    html2canvas(stamp).then(canvas => {
        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.download = "stamp.jpg";
        link.click();
    });
}
</script>

</body>
</html>
